<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my-page</title>
    <style>
        body {
            background-color: #fce4ec;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            color: #333;
        }

        .profile-card {
            background: #fff;
            width: 90%;
            max-width: 400px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            position: relative;
        }

        /* アイコンエリア：高さをしっかり確保 */
        .profile-header {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
            width: 100%;
            min-height: 120px;
        }

        .profile-img {
            width: 100px;
            height: auto;
            object-fit: contain;
            flex-shrink: 0;
        }

        /* ★英語挨拶：突き抜けを物理的に防ぐ新しい構造★ */
        .greeting-container {
            position: absolute;
            left: calc(50% + 55px);
            top: 45px;
            width: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* 強制的に斜体にする */
            font-style: italic !important;
            color: #555;
            font-size: 0.95rem;
        }

        .slash-line {
            display: block;
            width: 100%;
            text-align: center;
            font-style: italic !important;
        }

        /* ★ここが重要：右側のスラッシュを起点に文字を出すことで左突き抜けを防止★ */
        #eng-greeting-wrap {
            display: block;
            width: 100%;
            text-align: center; /* 中心を基準にタイピング */
            min-height: 1.2em;
            white-space: nowrap;
            font-style: italic !important;
        }

        /* 日付：重なりを防止し、確実に斜体にする */
        .date-slant {
            font-style: italic !important;
            color: #999;
            font-size: 0.8rem;
            margin: 15px 0 5px 0;
            display: block;
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            font-family: serif;
        }

        /* 学習中：ホバー設定 */
        .study-text {
            color: #999;
            font-size: 0.9rem;
            margin: 5px 0 15px 0;
            font-family: sans-serif;
            cursor: pointer;
            position: relative;
            display: inline-block;
        }

        .study-text:hover::after {
            content: "LinuxとSQLの基礎を実習中！"; 
            position: absolute;
            bottom: 130%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            white-space: nowrap;
            z-index: 50;
        }

        .intro {
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 20px;
            font-family: sans-serif;
        }

        .skill-tags {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .skill-tag {
            background-color: #eee;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-family: sans-serif;
        }

        #show-greeting-btn {
            background-color: #eee;
            border: none;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            color: #333;
        }

        /* 日本語挨拶ポップアップ（右下「閉じる」） */
        #greeting-modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        #greeting-modal {
            background: #f0f0f5;
            width: 80%;
            max-width: 300px;
            border-radius: 15px;
            padding: 25px 20px 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        #close-modal-btn {
            background: none;
            border: none;
            color: #007aff;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            padding-top: 10px;
            border-top: 1px solid #ccc;
            display: block;
            text-align: right;
        }

        .links {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .links a {
            text-decoration: none;
            color: #64b5f6;
            font-size: 0.9rem;
            margin: 0 10px;
        }
    </style>
</head>
<body>

<div class="profile-card">
    <div class="profile-header">
        <img src="IMG_3942.png" alt="プロフィール写真" class="profile-img">
        <div class="greeting-container">
            <span class="slash-line">／</span>
            <span id="eng-greeting-wrap"></span>
            <span class="slash-line">＼</span>
        </div>
    </div>

    <span id="today-date" class="date-slant"></span>
    <h1>machiko</h1>
    <p class="study-text">Web制作 学習中✏︎</p>

    <p class="intro">
        Webデザイン・プログラミングの勉強を始めてみました！<br>
        ど初心者のため手探り状態です（笑）<br>
        美味しいもの・美しいものが好きです♡
    </p>

    <div class="skill-tags">
        <span class="skill-tag">HTML5</span>
        <span class="skill-tag">CSS3</span>
        <span class="skill-tag">JavaScript</span>
        <span class="skill-tag">Photography</span>
    </div>

    <button id="show-greeting-btn">挨拶を表示する</button>

    <div class="links">
        <a href="#">Twitter / X</a> | <a href="#">Instagram</a>
    </div>
</div>

<div id="greeting-modal-overlay">
    <div id="greeting-modal">
        <div class="modal-text">こんにちは！よろしくお願いします！</div>
        <button id="close-modal-btn">閉じる</button>
    </div>
</div>

<script>
    const now = new Date();
    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById('today-date').innerText = now.toLocaleDateString('en-US', options);

    const hour = now.getHours();
    let engMsg = (hour >= 5 && hour < 12) ? "Good morning!" :
                 (hour >= 12 && hour < 18) ? "Good afternoon!" : "Good evening!";
    
    let i = 0;
    function typeEng() {
        if (i < engMsg.length) {
            document.getElementById("eng-greeting-wrap").innerHTML += engMsg.charAt(i);
            i++;
            setTimeout(typeEng, 100);
        }
    }
    typeEng();

    const showBtn = document.getElementById('show-greeting-btn');
    const closeBtn = document.getElementById('close-modal-btn');
    const overlay = document.getElementById('greeting-modal-overlay');

    showBtn.addEventListener('click', () => overlay.style.display = 'flex');
    closeBtn.addEventListener('click', () => overlay.style.display = 'none');
</script>

</body>
</html>
