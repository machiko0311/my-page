<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my-page</title>
    <style>
        body {
            background-color: #fce4ec;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: serif;
            color: #333;
        }

        .profile-card {
            background: #fff;
            width: 90%;
            max-width: 400px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        .profile-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        /* ★アイコン：元の二重線デザインに戻しました★ */
        .profile-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid #ddd;
            padding: 3px;
            background-color: #fff;
            box-shadow: 0 0 0 1px #eee;
            flex-shrink: 0; /* タイピング中にサイズが変わらないよう固定 */
        }

        /* ★英語挨拶：幅を固定してアイコンを動かさない・突き抜けを防止★ */
        .greeting-container {
            font-style: italic;
            color: #555;
            font-size: 0.95rem;
            line-height: 1.2;
            text-align: center;
            width: 120px; /* 幅を固定し、アイコンの位置を動かさない */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .slash-line {
            display: block;
            width: 100%;
        }

        /* 文字が突き抜けないよう、中央揃えで幅を制限 */
        #eng-greeting-wrap {
            display: block;
            margin: 2px 0;
            min-height: 1.2em;
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
        }

        /* 日付：名前の上、斜体 */
        .date-slant {
            font-style: italic;
            color: #999;
            font-size: 0.8rem;
            margin: 10px 0 5px 0;
            display: block;
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
        }

        .tooltip-container {
            position: relative;
            display: inline-block;
            cursor: help;
            margin: 5px 0 15px 0;
        }

        .study-text {
            color: #999;
            font-size: 0.9rem;
            margin: 0;
        }

        .tooltip {
            visibility: hidden;
            width: 200px;
            background-color: #555;
            color: #fff;
            text-align: center;
            border-radius: 6px;
            padding: 8px;
            position: absolute;
            z-index: 10;
            bottom: 150%;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.3s;
            font-size: 0.8rem;
        }

        .tooltip-container:hover .tooltip {
            visibility: visible;
            opacity: 1;
        }

        .intro {
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .skill-tags {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .skill-tag {
            background-color: #eee;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-family: sans-serif;
        }

        .links {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .links a {
            text-decoration: none;
            color: #64b5f6;
            font-size: 0.9rem;
            margin: 0 10px;
        }

        #show-greeting-btn {
            background-color: #eee;
            border: none;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-top: 15px;
            color: #333;
        }

        /* ★画像通りのポップアップ（ダイアログ）★ */
        #greeting-modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        #greeting-modal {
            background: #f0f0f5;
            width: 80%;
            max-width: 300px;
            border-radius: 15px;
            padding: 25px 20px 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            font-family: sans-serif;
        }

        .modal-text {
            font-size: 1rem;
            margin-bottom: 20px;
            color: #000;
        }

        #close-modal-btn {
            background: none;
            border: none;
            color: #007aff;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            padding-top: 10px;
            border-top: 1px solid #ccc;
            display: block;
            text-align: right;
        }
    </style>
</head>
<body>

<div class="profile-card">
    <div class="profile-header">
        <img src="IMG_3942.png" alt="プロフィール写真" class="profile-img">
        <div class="greeting-container">
            <span class="slash-line">／</span>
            <span id="eng-greeting-wrap"></span>
            <span class="slash-line">＼</span>
        </div>
    </div>

    <span id="today-date" class="date-slant"></span>
    <h1>machiko</h1>
    
    <div class="tooltip-container">
        <p class="study-text">Web制作 学習中✏︎</p>
        <span class="tooltip">LinuxとSQLの基礎を実習中！</span>
    </div>

    <p class="intro">
        Webデザイン・プログラミングの勉強を始めてみました！<br>
        ど初心者のため手探り状態です（笑）<br>
        美味しいもの・美しいものが好きです♡
    </p>

    <div class="skill-tags">
        <span class="skill-tag">HTML5</span>
        <span class="skill-tag">CSS3</span>
        <span class="skill-tag">JavaScript</span>
        <span class="skill-tag">Photography</span>
    </div>

    <button id="show-greeting-btn">挨拶を表示する</button>

    <div class="links">
        <a href="https://twitter.com/YOUR_ID" target="_blank">Twitter / X</a> | 
        <a href="https://www.instagram.com/YOUR_ID" target="_blank">Instagram</a>
    </div>
</div>

<div id="greeting-modal-overlay">
    <div id="greeting-modal">
        <div class="modal-text">こんにちは！よろしくお願いします！</div>
        <button id="close-modal-btn">閉じる</button>
    </div>
</div>

<script>
    const now = new Date();
    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById('today-date').innerText = now.toLocaleDateString('en-US', options);

    const hour = now.getHours();
    let engMsg = (hour >= 5 && hour < 12) ? "Good morning!" :
                 (hour >= 12 && hour < 18) ? "Good afternoon!" : "Good evening!";
    
    let i = 0;
    function typeEng() {
        if (i < engMsg.length) {
            document.getElementById("eng-greeting-wrap").innerHTML += engMsg.charAt(i);
            i++;
            setTimeout(typeEng, 100);
        }
    }
    typeEng();

    const showBtn = document.getElementById('show-greeting-btn');
    const closeBtn = document.getElementById('close-modal-btn');
    const overlay = document.getElementById('greeting-modal-overlay');

    showBtn.addEventListener('click', () => overlay.style.display = 'flex');
    closeBtn.addEventListener('click', () => overlay.style.display = 'none');
</script>

</body>
</html>
