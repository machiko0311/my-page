<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my-page</title>
    <style>
        /* 全体のレイアウト：中央寄せ */
        body {
            background-color: #fce4ec;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: serif;
        }

        /* プロフィールカード */
        .profile-card {
            background: #fff;
            width: 90%;
            max-width: 400px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        /* アイコンと英語挨拶の横並び */
        .profile-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        /* アイコンサイズ固定 */
        .profile-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #eee;
        }

        /* 英語挨拶と日付のグループ */
        .profile-text-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        /* 英語挨拶：斜体・一文字ずつ用 */
        .greeting-slant {
            font-style: italic;
            color: #555;
            margin: 0;
            font-size: 0.95rem;
            min-height: 1.2em;
        }

        /* ツールチップのコンテナ */
        .tooltip-container {
            position: relative;
            display: inline-block;
            cursor: help;
            margin: 10px 0;
        }

        /* 学習中のテキスト */
        .study-text {
            color: #666;
            font-size: 0.9rem;
            margin: 0;
        }

        /* ツールチップ本体 */
        .tooltip {
            visibility: hidden;
            width: 200px;
            background-color: #555;
            color: #fff;
            text-align: center;
            border-radius: 6px;
            padding: 8px;
            position: absolute;
            z-index: 10;
            bottom: 150%;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.3s;
            font-size: 0.8rem;
            font-style: normal;
        }

        .tooltip-container:hover .tooltip {
            visibility: visible;
            opacity: 1;
        }

        /* 自己紹介文 */
        .intro {
            font-size: 0.9rem;
            line-height: 1.6;
            margin: 20px 0;
        }

        /* ボタンと日本語挨拶 */
        #show-greeting-btn {
            background-color: #fff;
            border: 1px solid #ccc;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        #jp-greeting-display {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #333;
            min-height: 1.5em;
        }
    </style>
</head>
<body>

<div class="profile-card">
    <div class="profile-header">
        <img src="profile.png" alt="プロフィール写真" class="profile-img">
        <div class="profile-text-group">
            <p id="eng-greeting" class="greeting-slant"></p>
            <p id="today-date" style="color: #999; font-size: 0.8rem; font-style: italic; margin-top: 5px;"></p>
        </div>
    </div>

    <div class="content-container">
        <h1 style="margin: 0; font-size: 1.5rem;">machiko</h1>
        
        <div class="tooltip-container">
            <p class="study-text">Web制作 学習中✏︎</p>
            <span class="tooltip">LinuxとSQLの基礎を実習中！</span>
        </div>

        <p class="intro">
            Webデザイン・プログラミングの勉強を始めてみました！<br>
            ど初心者のため手探り状態です（笑）<br>
            美味しいもの・美しいものが好きです♡
        </p>

        <p id="jp-greeting-display"></p>
        <button id="show-greeting-btn">挨拶を表示する</button>
    </div>
</div>

<script>
    // 1. 日付表示
    const now = new Date();
    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById('today-date').innerText = now.toLocaleDateString('en-US', options);

    // 2. 英語挨拶（斜体・一文字ずつ・スラッシュの向き修正）
    const hour = now.getHours();
    let engMsg = (hour >= 5 && hour < 12) ? "Good morning!" :
                 (hour >= 12 && hour < 18) ? "Good afternoon!" : "Good evening!";
    const fullEngMsg = "／ " + engMsg + " ＼";

    let i = 0;
    function typeEng() {
        if (i < fullEngMsg.length) {
            document.getElementById("eng-greeting").innerHTML += fullEngMsg.charAt(i);
            i++;
            setTimeout(typeEng, 100);
        }
    }
    typeEng();

    // 3. 日本語挨拶ボタン
    document.getElementById('show-greeting-btn').addEventListener('click', function() {
        document.getElementById('jp-greeting-display').innerText = "こんにちは！はじめまして！";
    });
</script>

</body>
</html>
