<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
    <style>
        /* --- CSS: デザインの設定 --- */
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color:
#fce4ec; /* 薄いグレーの背景 */
            color: #333;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: #fff;
            width: 90%;
            max-width: 450px;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); /* 柔らかい影 */
            text-align: center;
        }

        .profile-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #fce4ec;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
            color: #2c3e50;
        }

        .job {
            font-size: 0.9rem;
            color: #999;
            margin-bottom: 20px;
            display: block;
        }

        .intro {
            font-size: 0.95rem;
            text-align: left;
            margin-bottom: 30px;
            padding: 0 10px;
        }

        .skills {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            list-style: none;
            padding: 0;
        }

        .skills li {
            background: #edf2f7;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: #4a5568;
            font-weight: bold;
        }

        .footer {
            margin-top: 30px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .sns-link {
            text-decoration: none;
            color: #3498db;
            font-size: 0.9rem;
            transition: opacity 0.3s;
        }

        .sns-link:hover {
            opacity: 0.7;
        }
   /* 吹き出しのコンテナ */
.chat-container {
    position: relative;
    display: flex;
    margin-left: 120px;
    margin-bottom: 10px;
}

/* 吹き出し本体のデザイン */
.bubble {
    position: relative;
    background: #fff;
    border: 2px solid #fce4ec; /* 背景に合わせた薄いピンク */
    border-radius: 15px;
    padding: 8px 15px;
    font-size: 0.9rem;
    color: #555;
    min-width: 100px;
    min-height: 20px;
}

/* 吹き出しの「しっぽ」部分 */
.bubble::after {
    content: "";
    position: absolute;
    bottom: -10px;
    left: 50%;
    margin-left: -10px;
    border-width: 10px 10px 0;
    border-style: solid;
    border-color: #fff transparent transparent;
}
.bubble::before {
    content: "";
    position: absolute;
    bottom: -13px;
    left: 50%;
    margin-left: -11px;
    border-width: 11px 11px 0;
    border-style: solid;
    border-color: #fce4ec transparent transparent;
}
    </style>
</head>
<body>

    <div class="card">
        <img src="IMG_3942.png" alt="プロフィール" style="width: 80px; border-radius: 50%;">
        <div class="chat-container">
  <div id="greeting-bubble" class="bubble"></div>
</div>

       <p id="today-date" style="color: #999; font-size: 0.85rem; font-style: italic; margin-top: 10px;"></p>
        <h1>machiko</h1>

        <span class="job" title="LinuxとSQLの基礎を実習中！">
  <a href="#" style="text-decoration: none; color: inherit;">Web制作 学習中✏︎</a>
</span>

        <p class="intro">
Webデザイン・プログラミングの勉強を始めてみました！
ど初心者のため手探り状態です（笑）
美味しいもの・美しいものが好きです♡
        </p>
 

        <ul class="skills">
            <li>HTML5</li>
            <li>CSS3</li>
            <li>JavaScript</li>
            <li>Photography</li>
        </ul>

                
<button id="helloBtn" class="message-button">挨拶を表示する</button>




        <div class="footer">
            <a href="#" class="sns-link">Twitter / X</a>
            <span style="margin: 0 10px; color: #ccc;">|</span>
            <a href="#" class="sns-link">Instagram</a>
        </div>


</div> <script>
        const btn = document.getElementById('helloBtn');
        btn.addEventListener('click', function() {
            alert('こんにちは！よろしくお願いします！');
        });
    </script>

<script>
  const now = new Date();
  // 英語表記用の設定（フルスペルで表示する設定です）
  const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
  
  // 「en-US（米国英語）」を指定し、余計な日本語を削除して表示します
  document.getElementById('today-date').innerText = now.toLocaleDateString('en-US', options);

  // 2. 時間帯による挨拶の判定
  const hour = now.getHours();
  let message = "";
  if (hour >= 5 && hour < 12) {
    message = "Good morning!";
  } else if (hour >= 12 && hour < 18) {
    message = "Good afternoon!";
  } else {
    message = "Good evening!";
  }

  // 3. 一文字ずつ表示させる関数
  let i = 0;
  function typeWriter() {
    if (i < message.length) {
      document.getElementById("greeting-bubble").innerHTML += message.charAt(i);
      i++;
      setTimeout(typeWriter, 100); // 100ミリ秒ごとに次の一文字を表示
    }
  }

  // 実行！
  typeWriter();
</script>
</body>
</html>
