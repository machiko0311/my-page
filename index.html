<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my-page</title>
    <style>
        body {
            background-color: #fce4ec;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: serif;
            color: #333;
        }

        .profile-card {
            background: #fff;
            width: 90%;
            max-width: 400px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        .profile-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        /* ★アイコン：image_6.pngの境界線を再現★ */
        .profile-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            
            /* 画像に馴染む、薄いグレーの円形境界線 */
            border: 1px solid rgba(220, 220, 220, 0.7);
        }

        /* 英語挨拶：上下のスラッシュ、全体を斜体に指定 */
        .greeting-container {
            font-style: italic; /* 確実に斜体 */
            color: #555;
            font-size: 0.95rem;
            line-height: 1.2;
            text-align: center;
        }

        .slash-line {
            display: block;
            font-style: italic;
        }

        /* ★ここを修正しました：カッコの貫通防止用のコンテナ★ */
        #eng-greeting-wrap {
            display: block;
            margin: 2px 0;
            min-height: 1.2em; /* 文字が出る前のスペース確保 */
        }

        /* 日付：名前の上、中央配置、斜体 */
        .date-slant {
            font-style: italic; /* 確実に斜体 */
            color: #999;
            font-size: 0.8rem;
            margin: 10px 0 5px 0;
            display: block; /* 中央寄せのため */
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
        }

        /* ツールチップ関連（学習中✏︎） */
        .tooltip-container {
            position: relative;
            display: inline-block;
            cursor: help;
            margin: 5px 0 15px 0;
        }

        .study-text {
            color: #999; /* 薄いグレー */
            font-size: 0.9rem;
            margin: 0;
        }

        .tooltip {
            visibility: hidden;
            width: 200px;
            background-color: #555;
            color: #fff;
            text-align: center;
            border-radius: 6px;
            padding: 8px;
            position: absolute;
            z-index: 10;
            bottom: 150%;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.3s;
            font-size: 0.8rem;
            font-style: normal; /* ツールチップは斜体ではない */
        }

        .tooltip-container:hover .tooltip {
            visibility: visible;
            opacity: 1;
        }

        /* 自己紹介文 */
        .intro {
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        /* スキルタグ：楕円形グレー */
        .skill-tags {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .skill-tag {
            background-color: #eee; /* 薄いグレーの背景 */
            padding: 5px 15px;
            border-radius: 20px; /* 楕円形 */
            font-size: 0.8rem;
            font-family: sans-serif;
        }

        /* SNSリンク */
        .links {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .links a {
            text-decoration: none;
            color: #64b5f6;
            font-size: 0.9rem;
            margin: 0 10px;
        }

        /* 日本語挨拶ボタン */
        #show-greeting-btn {
            background-color: #fff;
            border: 1px solid #ccc;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-top: 15px;
        }

        /* ★日本語挨拶：表示エリアとバツボタン★ */
        #jp-greeting-area {
            display: none; /* 初期状態は非表示 */
            justify-content: center;
            align-items: center;
            margin-top: 10px;
            gap: 10px;
        }

        #jp-greeting-display {
            font-size: 0.9rem;
            min-height: 1.5em;
        }

        #close-greeting-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: #999;
            padding: 0;
            line-height: 1;
        }
    </style>
</head>
<body>

<div class="profile-card">
    <div class="profile-header">
        <img src="IMG_3942.png" alt="プロフィール写真" class="profile-img">
        <div class="greeting-container">
            <span class="slash-line">／</span>
            <span id="eng-greeting-wrap"></span>
            <span class="slash-line">＼</span>
        </div>
    </div>

    <span id="today-date" class="date-slant"></span>
    <h1>machiko</h1>
    
    <div class="tooltip-container">
        <p class="study-text">Web制作 学習中✏︎</p>
        <span class="tooltip">LinuxとSQLの基礎を実習中！</span>
    </div>

    <p class="intro">
        Webデザイン・プログラミングの勉強を始めてみました！<br>
        ど初心者のため手探り状態です（笑）<br>
        美味しいもの・美しいものが好きです♡
    </p>

    <div class="skill-tags">
        <span class="skill-tag">HTML5</span>
        <span class="skill-tag">CSS3</span>
        <span class="skill-tag">JavaScript</span>
        <span class="skill-tag">Photography</span>
    </div>

    <div id="jp-greeting-area">
        <span id="jp-greeting-display"></span>
        <button id="close-greeting-btn">×</button>
    </div>
    <button id="show-greeting-btn">挨拶を表示する</button>

    <div class="links">
        <a href="https://twitter.com/YOUR_ID" target="_blank">Twitter / X</a> | 
        <a href="https://www.instagram.com/YOUR_ID" target="_blank">Instagram</a>
    </div>
</div>

<script>
    // 1. 日付表示（英語・斜体用クラス適用）
    const now = new Date();
    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById('today-date').innerText = now.toLocaleDateString('en-US', options);

    // 2. 英語挨拶（斜体・一文字ずつ・カッコの貫通防止）
    const hour = now.getHours();
    let engMsg = (hour >= 5 && hour < 12) ? "Good morning!" :
                 (hour >= 12 && hour < 18) ? "Good afternoon!" : "Good evening!";
    
    let i = 0;
    function typeEng() {
        if (i < engMsg.length) {
            // ★カッコの貫通を防ぐため、文字だけをコンテナに追加★
            document.getElementById("eng-greeting-wrap").innerHTML += engMsg.charAt(i);
            i++;
            setTimeout(typeEng, 100);
        }
    }
    typeEng();

    // 3. 日本語挨拶ボタン：表示と非表示（バツボタン）
    const showBtn = document.getElementById('show-greeting-btn');
    const closeBtn = document.getElementById('close-greeting-btn');
    const greetingArea = document.getElementById('jp-greeting-area');
    const greetingDisplay = document.getElementById('jp-greeting-display');

    showBtn.addEventListener('click', function() {
        greetingDisplay.innerText = "こんにちは！はじめまして！";
        greetingArea.style.display = 'flex'; // エリアを表示
        showBtn.style.display = 'none'; // 表示ボタンを隠す
    });

    closeBtn.addEventListener('click', function() {
        greetingArea.style.display = 'none'; // エリアを非表示
        showBtn.style.display = 'inline-block'; // 表示ボタンを戻す
        greetingDisplay.innerText = ""; // 文字をクリア
    });
</script>

</body>
</html>
