<body>

    <div class="card"> <div class="profile-header">
            <img src="IMG_3942.png" alt="プロフィール" class="profile-img" style="margin-bottom: 0;">
            <div class="profile-text-group">
                <p id="greeting-bubble" class="greeting-slant"></p>
                <p id="today-date" style="color: #999; font-size: 0.85rem; font-style: italic; margin-top: 5px;"></p>
            </div>
        </div>

        <div class="content-container">
            <h1>machiko</h1>

            <span class="job" title="LinuxとSQLの基礎を実習中！">
                <a href="#" style="text-decoration: none; color: inherit;">Web制作 学習中✏︎</a>
            </span>

            <p class="intro">
                Webデザイン・プログラミングの勉強を始めてみました！<br>
                ど初心者のため手探り状態です（笑）<br>
                美味しいもの・美しいものが好きです♡
            </p>

            <div class="skills" style="list-style: none; display: flex; justify-content: center; gap: 10px; margin-bottom: 20px;">
                <li style="background: #edf2f7; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; color: #4a5568; font-weight: bold;">HTML5</li>
                <li style="background: #edf2f7; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; color: #4a5568; font-weight: bold;">CSS3</li>
                <li style="background: #edf2f7; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; color: #4a5568; font-weight: bold;">JavaScript</li>
            </div>

            <button id="show-greeting-btn" style="padding: 10px 20px; border-radius: 5px; border: 1px solid #ccc; background: #fff; cursor: pointer;">挨拶を表示する</button>
        </div>

        <div class="footer">
            <a href="#" class="sns-link">Twitter / X</a>
            <span style="margin: 0 10px; color: #ccc;">|</span>
            <a href="#" class="sns-link">Instagram</a>
        </div>

    </div> <script>
        // A. 日本語の挨拶ボタンの動作
        // ボタンのID「show-greeting-btn」をしっかり捕まえます
        const helloBtn = document.getElementById('show-greeting-btn');
        helloBtn.addEventListener('click', function() {
            alert('こんにちは！よろしくお願いします！');
        });

        // B. 英語の日付と「一文字ずつ出る」英語挨拶の動作
        const now = new Date();
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('today-date').innerText = now.toLocaleDateString('en-US', options);

        const hour = now.getHours();
        let coreMessage = (hour >= 5 && hour < 12) ? "Good morning!" :
                          (hour >= 12 && hour < 18) ? "Good afternoon!" : "Good evening!";
        
        // ご希望通りのスラッシュ形式
        const fullMessage = "／ " + coreMessage + " ＼";

        let i = 0;
        function typeWriter() {
            if (i < fullMessage.length) {
                document.getElementById("greeting-bubble").innerHTML += fullMessage.charAt(i);
                i++;
                setTimeout(typeWriter, 100);
            }
        }
        typeWriter(); 
    </script>
</body>
